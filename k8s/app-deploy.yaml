apiVersion: v1
kind: Namespace

metadata:
  name: my-ns
---
kind: Secret
apiVersion: v1

metadata:
  name: mysql-sec
  namespace: my-ns

type: opaque
data:
  password: QWRtaW5AJCUxMjM= # echo -n "Admin@$%123" | base64
---
apiVersion: v1
kind: Service
metadata:
  name: my-svc
  namespace: my-ns
spec:
  selector:
    app: my-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-dep
  namespace: my-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-web
  template:
    metadata:
      labels:
        app: my-web
    spec:
      containers:
      - name: my-pod
        image: yashmane108/simple-app:REPLACE_ME
        resources:
          requests:
            memory: "64Mi"   # Guaranteed 64 Megabytes
            cpu: "100m"      # 10% of 1 CPU core
          limits:
            memory: "128Mi"  # Hard cap at 128 Megabytes
            cpu: "500m"       # Max 50% of 1 CPU core
        ports:
        - containerPort: 80
        env: 
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-sec
                key: password
        # --- ADD PROBES BELOW ---
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10 # Give Nginx 10s to start up
          periodSeconds: 15       # Check every 15 seconds
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5  # Start checking almost immediately
          periodSeconds: 5        # Check often for traffic routing
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-ing
  namespace: my-ns
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-svc
            port:
              number: 80

